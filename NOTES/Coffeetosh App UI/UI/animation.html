<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Coffeetosh — Hero Animation</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@900&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-base:#1A1310;
  --bg-card:#342920;
  --accent:#D4923A;
  --text-primary:#F0E6D8;
  --text-secondary:#A89680;
}
html,body{height:100%;overflow:hidden;background:var(--bg-base);color:var(--text-primary)}

/* ── Hero section ── */
.hero{
  position:relative;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:0 24px;
  overflow:hidden;
}

/* Live badge */
.live-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--bg-card);
  border-radius:999px;padding:5px 14px;
  font-family:'Inter',sans-serif;font-weight:500;font-size:13px;
  color:var(--text-secondary);
  opacity:0;
  animation:fadeUp .6s .15s ease both;
}
.live-dot{
  width:7px;height:7px;border-radius:50%;background:var(--accent);
  animation:pulse 2s ease-in-out infinite;flex-shrink:0;
}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.4;transform:scale(.65)}
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

/* Headline */
.hero-headline{
  font-family:'Nunito',sans-serif;font-weight:900;
  font-size:clamp(2.8rem,7vw,5.5rem);
  line-height:1.08;letter-spacing:-1.5px;
  color:var(--text-primary);
  margin-top:20px;
}
.hero-headline .word{display:inline-block;opacity:0;transform:translateY(18px)}
.hero-headline .word-alive{color:var(--accent)}

/* Subtext */
.hero-sub{
  font-family:'Inter',sans-serif;
  font-size:clamp(1rem,2vw,1.2rem);
  color:var(--text-secondary);
  max-width:520px;margin-top:10px;
  opacity:0;animation:fadeUp .6s 1s ease both;
}

/* Illustration area — 60% of viewport */
.hero-illus{
  position:relative;width:96vw;max-width:1460px;height:68vh;
  margin-top:10px;opacity:0;animation:fadeUp .6s .8s ease both;
}
#laptop-canvas{
  position:absolute;inset:0;width:100%;height:100%;border-radius:12px;
}
.glow-ring{
  position:absolute;left:50%;bottom:30px;transform:translateX(-50%);
  width:90px;height:90px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,146,58,.25) 0%,transparent 70%);
  opacity:0;pointer-events:none;z-index:0;
  transition:opacity .5s ease;
}

/* CTA button */
.hero-cta-wrap{
  width:100%;display:flex;justify-content:center;margin-top:12px;
  opacity:0;animation:fadeUp .6s 1.2s ease both;
}
.hero-btn{
  display:inline-flex;align-items:center;gap:10px;
  padding:16px 40px;border-radius:999px;
  background:var(--accent);color:var(--bg-base);
  font-family:'Nunito',sans-serif;font-weight:900;font-size:17px;
  text-decoration:none;letter-spacing:-.2px;
  transition:box-shadow .2s,filter .2s;cursor:pointer;border:none;
}
.hero-btn:hover{
  box-shadow:0 8px 32px rgba(212,146,58,.38);filter:brightness(1.08);
}

/* Responsive */
@media(max-width:680px){
  .hero-illus{height:48vh}
  .hero-headline{font-size:clamp(2rem,7vw,3.5rem)}
}
</style>
</head>
<body>

<section class="hero">
  <div class="live-badge">
    <span class="live-dot"></span>
    <span>Coffeetosh is running</span>
  </div>

  <h1 class="hero-headline">
    <span class="word">Addicting</span>&nbsp;<span class="word">your</span>&nbsp;<span class="word">mac</span>&nbsp;<span class="word">to</span>&nbsp;<span class="word">stay</span>&nbsp;<span class="word word-alive">alive</span>
  </h1>

  <p class="hero-sub">The open-source sleep preventer for macOS. No root hacks. Free forever.</p>

  <div class="hero-illus" id="hero-illus">
    <div class="glow-ring" id="glow-ring"></div>
    <canvas id="laptop-canvas"></canvas>
  </div>

  <div class="hero-cta-wrap">
    <a href="download.html" class="hero-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 3v12m0 0l-4-4m4 4l4-4M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Download for Mac</span>
    </a>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
(function(){
  /* Rounded box helper (from animation1 composition). */
  function makeRoundedBoxGeo(w, h, d, r) {
    const shape = new THREE.Shape();
    const hw = w / 2 - r;
    const hh = h / 2 - r;
    shape.moveTo(-hw, -h / 2);
    shape.lineTo(hw, -h / 2);
    shape.quadraticCurveTo(w / 2, -h / 2, w / 2, -hh);
    shape.lineTo(w / 2, hh);
    shape.quadraticCurveTo(w / 2, h / 2, hw, h / 2);
    shape.lineTo(-hw, h / 2);
    shape.quadraticCurveTo(-w / 2, h / 2, -w / 2, hh);
    shape.lineTo(-w / 2, -hh);
    shape.quadraticCurveTo(-w / 2, -h / 2, -hw, -h / 2);
    const geo = new THREE.ExtrudeGeometry(shape, {
      depth: d,
      bevelEnabled: true,
      bevelThickness: Math.min(r * 0.3, d * 0.3),
      bevelSize: Math.min(r * 0.3, 0.02),
      bevelSegments: 3,
    });
    geo.center();
    return geo;
  }

  /* ── Word stagger ── */
  const words = document.querySelectorAll('.hero-headline .word');
  words.forEach((w, i) => {
    w.style.transition = `opacity .45s ease ${.35 + i * .1}s, transform .45s ease ${.35 + i * .1}s`;
    requestAnimationFrame(() => { w.style.opacity = '1'; w.style.transform = 'translateY(0)'; });
  });

  /* ── Three.js setup ── */
  const canvas = document.getElementById('laptop-canvas');
  const container = document.getElementById('hero-illus');
  const W = container.clientWidth, H = container.clientHeight;

  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.outputEncoding = THREE.sRGBEncoding;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, W / H, 0.01, 100);
  camera.position.set(0, 0.22, 3.05);
  camera.lookAt(0, 0, 0);

  /* Lights */
  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const dLight = new THREE.DirectionalLight(0xfff5e0, 1.1);
  dLight.position.set(3, 5, 4);
  scene.add(dLight);
  const pLight = new THREE.PointLight(0xD4923A, 0.7, 2.5);
  pLight.position.set(0, 0.2, 0.6);
  scene.add(pLight);

  /* Master group for idle float */
  const masterGroup = new THREE.Group();
  scene.add(masterGroup);

  /* ── Screen media (video disabled for now; keep hooks for future) ── */
  const ENABLE_SCREEN_VIDEO = false;
  const video = document.createElement('video');
  if (ENABLE_SCREEN_VIDEO) {
    video.src = 'assets/screen-video.mp4';
    video.loop = true;
    video.muted = true;
    video.playsInline = true;
    video.crossOrigin = 'anonymous';
    video.load();
  }
  let videoReady = false;
  let screenCandidate = null;

  /* Phones: use animation1 composition style/materials. */
  function makePhoneScreenTex(label) {
    const c = document.createElement('canvas');
    c.width = 220;
    c.height = 440;
    const x = c.getContext('2d');
    const g = x.createLinearGradient(0, 0, 0, 440);
    g.addColorStop(0, '#0c1824');
    g.addColorStop(1, '#162840');
    x.fillStyle = g;
    x.fillRect(0, 0, 220, 440);
    x.fillStyle = '#556677';
    x.font = '12px -apple-system, Helvetica, sans-serif';
    x.textAlign = 'center';
    x.fillText('12:00', 110, 28);
    x.fillStyle = '#D4923A';
    x.font = 'bold 20px -apple-system, Helvetica, sans-serif';
    x.fillText(label, 110, 200);
    x.fillStyle = '#4488aa';
    x.beginPath(); x.roundRect(30, 240, 160, 8, 4); x.fill();
    x.fillStyle = '#3a6688';
    x.beginPath(); x.roundRect(30, 260, 120, 8, 4); x.fill();
    x.beginPath(); x.roundRect(30, 280, 140, 8, 4); x.fill();
    return new THREE.CanvasTexture(c);
  }

  function createPhone(px, rotY, label) {
    const grp = new THREE.Group();
    const pw = 0.55, ph = 1.1, pd = 0.07;
    const body = new THREE.Mesh(
      makeRoundedBoxGeo(pw, ph, pd, 0.06),
      new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.6, roughness: 0.35 })
    );
    body.castShadow = true;
    grp.add(body);

    const scr = new THREE.Mesh(
      new THREE.PlaneGeometry(0.44, 0.96),
      new THREE.MeshBasicMaterial({ map: makePhoneScreenTex(label) })
    );
    scr.position.z = pd / 2 + 0.001;
    grp.add(scr);

    grp.position.set(px, 0.3, 0.8);
    grp.rotation.y = rotY;
    grp.scale.set(0, 0, 0);
    return grp;
  }

  const PHONE_X = 1.25;
  const PHONE_VISIBLE_SCALE = 0.58;
  const phoneL = createPhone(-PHONE_X, 0.3, 'iPhone');
  const phoneR = createPhone(PHONE_X, -0.3, 'iPhone');
  masterGroup.add(phoneL, phoneR);

  /* ── 3D dashed lines (animation1 style straight connectors) ── */
  function makeDash(from, to) {
    const geo = new THREE.BufferGeometry().setFromPoints([from.clone(), to.clone()]);
    const mat = new THREE.LineDashedMaterial({
      color: 0xD4923A, dashSize: 0.15, gapSize: 0.1,
      transparent: true, opacity: 0
    });
    const line = new THREE.Line(geo, mat);
    line.computeLineDistances();
    return line;
  }

  /* Lines originate from phones and travel toward laptop anchors. */
  const lineL = makeDash(
    new THREE.Vector3(-PHONE_X + 0.275, 0.3, 0.8),
    new THREE.Vector3(-0.95, 0.06, 0)
  );
  const lineR = makeDash(
    new THREE.Vector3(PHONE_X - 0.275, 0.3, 0.8),
    new THREE.Vector3(0.95, 0.06, 0)
  );
  masterGroup.add(lineL, lineR);
  const allLineMats = [lineL.material, lineR.material];

  /* ── Load GLB ── */
  let lidPivot = null;         /* pivot group AT the hinge — just rotate this */
  let bodyNodeRef = null;
  let lidNodeRef = null;
  let modelLoaded = false;

  let LID_OPEN_ANGLE = -Math.PI * 0.5;
  let LID_CLOSE_ANGLE = 0.05; // 0.05 rad (about 3 degrees) upwards to leave a tiny natural gap
  let LID_CLOSE_Y_OFFSET = 0; // Removing the physical sink!
  let LID_PIVOT_Y0 = 0;
  let LID_PIVOT_Z0 = 0;

  let lidProgress = 0; /* 0=open, 1=closed */
  let lidIsClosed = false;
  let lidIsAnimating = false;
  let lidAnimFrom = 0;
  let lidAnimTo = 0;
  let lidAnimStartMs = 0;
  const LID_TOGGLE_DUR_MS = 900;
  let autoCloseDone = false;
  let autoCloseStarted = false;

  function applyLidPose(progress) {
    if (!lidPivot) return;
    lidPivot.rotation.x = LID_OPEN_ANGLE + (LID_CLOSE_ANGLE - LID_OPEN_ANGLE) * progress;
    lidPivot.position.y = LID_PIVOT_Y0 + (LID_CLOSE_Y_OFFSET * progress);
  }

  function syncScreenPlayback() {
    if (!ENABLE_SCREEN_VIDEO) return;
    if (!videoReady) return;
    if (lidIsClosed) video.pause();
    else video.play().catch(function() {});
  }

  function requestLidToggle() {
    if (!lidPivot || !modelLoaded) return;
    if (!autoCloseDone) return; /* First close is automatic; clicks start after that. */
    if (lidIsAnimating) return; /* Ignore extra clicks until current toggle finishes. */
    lidIsAnimating = true;
    lidAnimFrom = lidProgress;
    lidAnimTo = lidIsClosed ? 0 : 1;
    lidAnimStartMs = performance.now();
  }

  const loader = new THREE.GLTFLoader();
  loader.load('assets/macbook.glb', function(gltf) {
    const model = gltf.scene;

    /* Scale + center FIRST so all measurements below are in final world units. */
    var box0 = new THREE.Box3().setFromObject(model);
    var size0 = box0.getSize(new THREE.Vector3());
    var sf = 1.6 / Math.max(size0.x, size0.y, size0.z);
    model.scale.setScalar(sf);
    var box1 = new THREE.Box3().setFromObject(model);
    var ctr = box1.getCenter(new THREE.Vector3());
    model.position.sub(ctr);
    model.position.y -= 0.08;
    model.updateMatrixWorld(true);

    let lidNode = null, bodyNode = null;
    model.traverse(function(obj) {
      if (!lidNode  && obj.name && obj.name.indexOf('VCQqxpxkUlzqcJI') !== -1) lidNode  = obj;
      if (!bodyNode && obj.name && obj.name.indexOf('BoBvWqDHZjAeVrp') !== -1) bodyNode = obj;
    });
    console.log('[GLB] lid:', lidNode && lidNode.name, 'body:', bodyNode && bodyNode.name);

    if (lidNode && bodyNode) {
      lidNodeRef = lidNode;
      bodyNodeRef = bodyNode;
      model.updateMatrixWorld(true);

      /* Use world boxes and convert hinge back to model-local, no identity assumptions. */
      const lidBox  = new THREE.Box3().setFromObject(lidNode);
      const bodyBox = new THREE.Box3().setFromObject(bodyNode);
      console.log('[GLB] lid  min', lidBox.min.toArray(),  'max', lidBox.max.toArray());
      console.log('[GLB] body min', bodyBox.min.toArray(), 'max', bodyBox.max.toArray());

      /* Hinge: center-X, top-of-body Y, body edge closest to lid in Z. */
      const lidCenterZ = (lidBox.min.z + lidBox.max.z) * 0.5;
      const bodyCenterZ = (bodyBox.min.z + bodyBox.max.z) * 0.5;
      
      // We take the closest Z edge (which is the back)
      let hingeZ = lidCenterZ >= bodyCenterZ ? bodyBox.max.z : bodyBox.min.z;

      const hingeWorld = new THREE.Vector3(
        (lidBox.min.x + lidBox.max.x) / 2,
        bodyBox.max.y,
        hingeZ
      );
      console.log('[GLB] hinge(world)', hingeWorld.toArray());

      /* Pivot-group with world-transform preservation. */
      lidPivot = new THREE.Group();
      lidPivot.position.copy(model.worldToLocal(hingeWorld.clone()));
      LID_PIVOT_Y0 = lidPivot.position.y;
      LID_PIVOT_Z0 = lidPivot.position.z;
      model.add(lidPivot);
      model.updateMatrixWorld(true);
      lidPivot.attach(lidNode);
      model.updateMatrixWorld(true);
      console.log('[GLB] pivot(local)', lidPivot.position.toArray());

      /* The model is actually modeled completely closed.
         Therefore, its initial rotation (0) is perfectly flat/closed. */
      LID_CLOSE_ANGLE = openSign * 0.05; // Force a very tiny angle so it hovers just over the keys
      LID_CLOSE_Z_OFFSET = 0;
      lidPivot.position.y = LID_PIVOT_Y0;
      lidPivot.position.z = LID_PIVOT_Z0;

      /* Determine open direction. We are at 0 (closed). 
         Let's find a point on the lid far from the hinge (e.g., the front edge). */
      lidPivot.rotation.x = 0;
      model.updateMatrixWorld(true);
      var closedLidBox = new THREE.Box3().setFromObject(lidNodeRef);
      var frontPointWorld = new THREE.Vector3(
        (closedLidBox.min.x + closedLidBox.max.x) / 2,
        (closedLidBox.min.y + closedLidBox.max.y) / 2,
        hingeWorld.z > closedLidBox.min.z ? closedLidBox.min.z : closedLidBox.max.z 
        // Picks the Z extreme furthest from the hinge (which is the front lip)
      );
      var frontPointLocal = lidNodeRef.worldToLocal(frontPointWorld.clone());

      /* Rotate slightly and see which direction moves the front lip UP. */
      lidPivot.rotation.x = +0.1;
      model.updateMatrixWorld(true);
      var tipUpPlus = lidNodeRef.localToWorld(frontPointLocal.clone()).y;

      lidPivot.rotation.x = -0.1;
      model.updateMatrixWorld(true);
      var tipUpMinus = lidNodeRef.localToWorld(frontPointLocal.clone()).y;

      var openSign = (tipUpPlus > tipUpMinus) ? 1 : -1;
      
      // Open to about 115 degrees (approx 2.0 radians)
      LID_OPEN_ANGLE = openSign * 2.0;

      // Set the final angle to have a microscopic gap instead of aggressively pressing 0
      LID_CLOSE_ANGLE = openSign * 0.05;
      
      console.log('[GLB] Models starts closed. Open Sign:', openSign, 'Open Angle:', LID_OPEN_ANGLE);

      /* Reset to open pose — animation starts from here. */
      lidPivot.rotation.x = LID_OPEN_ANGLE;
      lidPivot.position.y = LID_PIVOT_Y0;
      lidPivot.position.z = LID_PIVOT_Z0;
      console.log('[GLB] openAngle', LID_OPEN_ANGLE.toFixed(3), 'closeAngle', LID_CLOSE_ANGLE.toFixed(4));

      /* ── Video texture on the screen panel ── */
      screenCandidate = null;
      var bestArea = 0;
      lidNode.traverse(function(child) {
        if (!child.isMesh) return;
        var b = new THREE.Box3().setFromObject(child);
        var sz = b.getSize(new THREE.Vector3());
        var dims = [sz.x, sz.y, sz.z].sort(function(a, b) { return b - a; });
        var area = dims[0] * dims[1];
        if (area > bestArea && dims[2] < dims[0] * 0.15) {
          bestArea = area;
          screenCandidate = child;
        }
      });
      console.log('[GLB] screen candidate:', screenCandidate && screenCandidate.name,
                  'area:', bestArea.toFixed(1));

      function applyVideoToScreen() {
        if (!ENABLE_SCREEN_VIDEO) return;
        if (!screenCandidate) return;
        var vTex = new THREE.VideoTexture(video);
        vTex.encoding = THREE.sRGBEncoding;
        screenCandidate.material = new THREE.MeshBasicMaterial({ map: vTex, toneMapped: false });
        if (!lidIsClosed) video.play().catch(function() {});
        console.log('[GLB] video applied to', screenCandidate.name);
      }

      if (ENABLE_SCREEN_VIDEO) {
        video.addEventListener('canplay', function() {
          videoReady = true;
          applyVideoToScreen();
        }, { once: true });
        if (videoReady) applyVideoToScreen();
      }

      applyLidPose(0);

      /* Auto-close is started in the render loop once model is definitely ready in scene. */
    }

    masterGroup.add(model);
    modelLoaded = true;
    console.log('[GLB] loaded. scale:', sf);

  }, undefined, function(err) {
    console.error('[GLB] load error', err);
    modelLoaded = true;
  });

  /* Accept one click per complete lid toggle (no double-click race/stuck state). */
  canvas.addEventListener('pointerdown', requestLidToggle);

  /* ── Animation ── */
  const clock = new THREE.Clock();
  let elapsed = 0;
  const FLOAT_START  = 4.0;

  function ease(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }

  function animate() {
    requestAnimationFrame(animate);
    var dt = clock.getDelta();
    elapsed += dt;

    /* ── Lid toggle animation (open <-> closed) ── */
    if (lidPivot) {
      if (!autoCloseStarted && !autoCloseDone && !lidIsAnimating && modelLoaded) {
        autoCloseStarted = true;
        lidIsAnimating = true;
        lidAnimFrom = 0;
        lidAnimTo = 1;
        lidAnimStartMs = performance.now();
      }

      if (lidIsAnimating) {
        var t = Math.min((performance.now() - lidAnimStartMs) / LID_TOGGLE_DUR_MS, 1);
        var e = ease(t);
        lidProgress = lidAnimFrom + (lidAnimTo - lidAnimFrom) * e;
        if (t >= 1) {
          lidProgress = lidAnimTo;
          lidIsAnimating = false;
          lidIsClosed = lidProgress > 0.5;
          autoCloseDone = true;
          syncScreenPlayback();
        }
      }

      applyLidPose(lidProgress);
    }

    /* Phones and lines: one-by-one sequence after laptop nears closed state. */
    var seq = THREE.MathUtils.clamp((lidProgress - 0.80) / 0.20, 0, 1);
    var leftPhoneP = ease(THREE.MathUtils.clamp(seq / 0.25, 0, 1));
    var leftLineP = ease(THREE.MathUtils.clamp((seq - 0.25) / 0.25, 0, 1));
    var rightPhoneP = ease(THREE.MathUtils.clamp((seq - 0.50) / 0.25, 0, 1));
    var rightLineP = ease(THREE.MathUtils.clamp((seq - 0.75) / 0.25, 0, 1));

    phoneL.scale.set(leftPhoneP * PHONE_VISIBLE_SCALE, leftPhoneP * PHONE_VISIBLE_SCALE, leftPhoneP * PHONE_VISIBLE_SCALE);
    phoneR.scale.set(rightPhoneP * PHONE_VISIBLE_SCALE, rightPhoneP * PHONE_VISIBLE_SCALE, rightPhoneP * PHONE_VISIBLE_SCALE);
    lineL.material.opacity = leftLineP;
    lineR.material.opacity = rightLineP;
    document.getElementById('glow-ring').style.opacity = rightLineP > 0.01 ? '0.8' : '0';

    /* Animate dash offset so dashes "flow" along the line */
    lineL.material.dashOffset += dt * 0.08;
    lineR.material.dashOffset += dt * 0.08;

    /* Idle float */
    if (elapsed >= FLOAT_START) {
      masterGroup.position.y = Math.sin((elapsed - FLOAT_START) * 1.2) * 0.018;
    }

    renderer.render(scene, camera);
  }
  animate();

  /* ── Resize ── */
  window.addEventListener('resize', function() {
    var w = container.clientWidth, h = container.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
})();
</script>
</body>
</html>
