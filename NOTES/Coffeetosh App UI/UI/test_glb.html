<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GLB Lid Finder</title>
<style>
  body { margin: 0; background: #111; font-family: monospace; }
  canvas { display: block; }
  #info {
    position: fixed; top: 16px; left: 16px; color: #fff;
    background: rgba(0,0,0,0.7); padding: 12px 16px; border-radius: 8px;
    font-size: 13px; line-height: 1.8;
  }
  .red { color: #ff4444; font-weight: bold; }
  .blue { color: #44aaff; font-weight: bold; }
</style>
</head>
<body>
<div id="info">
  <span class="red">RED = Node 11 — body candidate (44 meshes)</span><br>
  <span class="blue">BLUE = Node 144 — lid candidate (17 meshes)</span><br>
  Which color is the <b>LID / screen</b>?
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);

const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.01, 1000);
camera.position.set(0, 0.3, 1.2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dl = new THREE.DirectionalLight(0xffffff, 1);
dl.position.set(2, 4, 3);
scene.add(dl);

const RED  = new THREE.MeshStandardMaterial({ color: 0xff4444, roughness: 0.4 });
const BLUE = new THREE.MeshStandardMaterial({ color: 0x4488ff, roughness: 0.4 });

const loader = new THREE.GLTFLoader();
loader.load('assets/macbook.glb', (gltf) => {
  const root = gltf.scene;

  let node11 = null, node144 = null;
  root.traverse(obj => {
    if (obj.name === 'BoBvWqDHZjAeVrp_44_8') node11 = obj;
    if (obj.name === 'VCQqxpxkUlzqcJI_62_97') node144 = obj;
  });

  if (node11)  node11.traverse(c  => { if (c.isMesh) c.material = RED; });
  if (node144) node144.traverse(c => { if (c.isMesh) c.material = BLUE; });

  // Center model
  const box = new THREE.Box3().setFromObject(root);
  const center = box.getCenter(new THREE.Vector3());
  root.position.sub(center);
  const size = box.getSize(new THREE.Vector3()).length();
  camera.position.set(0, size * 0.15, size * 0.9);
  controls.target.set(0, 0, 0);

  scene.add(root);
  console.log('Node 11 found:', !!node11, '  Node 144 found:', !!node144);
}, undefined, e => console.error(e));

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
