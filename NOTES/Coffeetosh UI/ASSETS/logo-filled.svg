<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <mask id="face-mask">
            <!-- Background to keep -->
            <rect x="0" y="0" width="24" height="24" fill="white" />
            <!-- Face parts to cut out (black) thinner strokes -->
            <g fill="none" stroke="black" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <!-- Eyes -->
                <line x1="8" y1="10.5" x2="8" y2="12.5" />
                <line x1="14" y1="10.5" x2="14" y2="12.5" />
                <!-- Nose -->
                <path d="M11.5 11 v 2.5 a 1 1 0 0 1 -1 1" />
                <!-- Smile -->
                <path d="M8 16 Q 11 18.5 14 16" />
            </g>
        </mask>
    </defs>

    <!-- Cup Handle Outline -->
    <path d="M19.5 8.5 c 4.5 0, 4.5 6, 0 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
    
    <!-- Solid Cup Body with Face Masked Out, top edge curved down -->
    <path d="M 2.5 5.5 v 7.5 c 0 4.5 4 8.5 8.5 8.5 s 8.5 -4 8.5 -8.5 v -7.5 A 8.5 2.8 0 0 1 2.5 5.5 Z" fill="currentColor" mask="url(#face-mask)" />
    
    <!-- Outline only for Top Ellipse to show empty/dark lid -->
    <ellipse cx="11" cy="5.5" rx="8.5" ry="2.8" fill="none" stroke="currentColor" stroke-width="1.3" />
</svg>