<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Coffeetosh — Hero Animation</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@900&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-base:#1A1310;
  --bg-card:#342920;
  --accent:#D4923A;
  --text-primary:#F0E6D8;
  --text-secondary:#A89680;
}
html,body{height:100%;overflow:hidden;background:var(--bg-base);color:var(--text-primary)}

/* ── Hero section ── */
.hero{
  position:relative;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:0 0 40px;
  overflow:visible;
}

/* Live badge */
.live-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--bg-card);
  border-radius:999px;padding:5px 14px;
  font-family:'Inter',sans-serif;font-weight:500;font-size:13px;
  color:var(--text-secondary);
  opacity:0;
  animation:fadeUp .6s .15s ease both;
}
.live-dot{
  width:7px;height:7px;border-radius:50%;background:var(--accent);
  animation:pulse 2s ease-in-out infinite;flex-shrink:0;
}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.4;transform:scale(.65)}
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

/* Headline */
.hero-headline{
  font-family:'Nunito',sans-serif;font-weight:900;
  font-size:clamp(2.8rem,7vw,5.5rem);
  line-height:1.08;letter-spacing:-1.5px;
  color:var(--text-primary);
  margin-top:0;
}
.hero-headline .word{display:inline-block;opacity:0;transform:translateY(18px)}
.hero-headline .word-alive{color:var(--accent)}

/* Subtext */
.hero-sub{
  font-family:'Inter',sans-serif;
  font-size:clamp(1rem,2vw,1.2rem);
  color:var(--text-secondary);
  max-width:520px;margin-top:4px;
  opacity:0;animation:fadeUp .6s 1s ease both;
}

/* Illustration area — large composition */
.hero-illus{
  position:relative;width:100vw;height:80vh;
  margin-top:-10px;opacity:0;animation:fadeUp .6s .8s ease both;
}
#laptop-canvas{
  position:absolute;inset:0;width:100%;height:100%;
}
.glow-ring{
  position:absolute;left:50%;bottom:30px;transform:translateX(-50%);
  width:90px;height:90px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,146,58,.25) 0%,transparent 70%);
  opacity:0;pointer-events:none;z-index:0;
  transition:opacity .5s ease;
}

/* CTA button */
.hero-cta-wrap{
  width:100%;display:flex;justify-content:center;margin-top:12px;
  opacity:0;animation:fadeUp .6s 1.2s ease both;
}
.hero-btn{
  display:inline-flex;align-items:center;gap:10px;
  padding:16px 40px;border-radius:999px;
  background:var(--accent);color:var(--bg-base);
  font-family:'Nunito',sans-serif;font-weight:900;font-size:17px;
  text-decoration:none;letter-spacing:-.2px;
  transition:box-shadow .2s,filter .2s,transform .35s cubic-bezier(.34,1.56,.64,1);
  cursor:pointer;border:none;
}
.hero-btn:hover{
  box-shadow:0 8px 32px rgba(212,146,58,.38);filter:brightness(1.08);
}


/* Responsive */
@media(max-width:680px){
  .hero-illus{width:100vw;height:85vh;margin-top:4px}
  .hero-headline{font-size:clamp(2rem,7vw,3.5rem)}
  .hero-sub{font-size:0.95rem;margin-top:6px}
}
</style>
</head>
<body>

<section class="hero">
  <h1 class="hero-headline">
    <span class="word">Addicting</span>&nbsp;<span class="word">your</span>&nbsp;<span class="word">mac</span>&nbsp;<span class="word">to</span>&nbsp;<span class="word">stay</span>&nbsp;<span class="word word-alive">alive</span>
  </h1>

  <p class="hero-sub">Keep your Mac awake with one click. Menu bar app, scheduled sessions, open-source & free.</p>

  <div class="hero-illus" id="hero-illus">
    <div class="glow-ring" id="glow-ring"></div>
    <canvas id="laptop-canvas"></canvas>

  </div>

  <div class="hero-cta-wrap">
    <a href="download.html" class="hero-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 3v12m0 0l-4-4m4 4l4-4M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Download for Mac</span>
    </a>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
(function(){
  /* Rounded box helper (from animation1 composition). */
  function makeRoundedBoxGeo(w, h, d, r) {
    const shape = new THREE.Shape();
    const hw = w / 2 - r;
    const hh = h / 2 - r;
    shape.moveTo(-hw, -h / 2);
    shape.lineTo(hw, -h / 2);
    shape.quadraticCurveTo(w / 2, -h / 2, w / 2, -hh);
    shape.lineTo(w / 2, hh);
    shape.quadraticCurveTo(w / 2, h / 2, hw, h / 2);
    shape.lineTo(-hw, h / 2);
    shape.quadraticCurveTo(-w / 2, h / 2, -w / 2, hh);
    shape.lineTo(-w / 2, -hh);
    shape.quadraticCurveTo(-w / 2, -h / 2, -hw, -h / 2);
    const geo = new THREE.ExtrudeGeometry(shape, {
      depth: d,
      bevelEnabled: true,
      bevelThickness: Math.min(r * 0.3, d * 0.3),
      bevelSize: Math.min(r * 0.3, 0.02),
      bevelSegments: 3,
    });
    geo.center();
    return geo;
  }

  /* ── Word stagger ── */
  const words = document.querySelectorAll('.hero-headline .word');
  words.forEach((w, i) => {
    w.style.transition = `opacity .45s ease ${.35 + i * .1}s, transform .45s ease ${.35 + i * .1}s`;
    requestAnimationFrame(() => { w.style.opacity = '1'; w.style.transform = 'translateY(0)'; });
  });

  /* ── Three.js setup ── */
  const canvas = document.getElementById('laptop-canvas');
  const container = document.getElementById('hero-illus');
  const W = container.clientWidth, H = container.clientHeight;

  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.outputEncoding = THREE.sRGBEncoding;

  const scene = new THREE.Scene();
  const isMobile = W < 700;
  const camera = new THREE.PerspectiveCamera(isMobile ? 60 : 35, W / H, 0.01, 100);
  camera.position.set(0, isMobile ? 0.6 : 0.55, isMobile ? 3.5 : 3.0);
  camera.lookAt(0, -0.2, 0);

  /* Lights */
  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const dLight = new THREE.DirectionalLight(0xfff5e0, 1.1);
  dLight.position.set(3, 5, 4);
  scene.add(dLight);
  const pLight = new THREE.PointLight(0xD4923A, 0.7, 2.5);
  pLight.position.set(0, 0.2, 0.6);
  scene.add(pLight);

  /* Master group for idle float */
  const masterGroup = new THREE.Group();
  scene.add(masterGroup);

  /* ── Screen media — video plays on open Mac, auto-closes 1s before end ── */
  const ENABLE_SCREEN_VIDEO = true;
  const video = document.createElement('video');
  if (ENABLE_SCREEN_VIDEO) {
    video.src = 'assets/Maxine.mp4';
    video.loop = false;
    video.muted = true;
    video.playsInline = true;
    video.playbackRate = 1.5;
    video.crossOrigin = 'anonymous';
    video.load();
  }
  let videoReady = false;
  let screenCandidate = null;

  /* Trigger auto-close 1 second before video ends */
  video.addEventListener('timeupdate', function() {
    if (heroState !== 'PLAYING') return;
    if (video.duration && video.currentTime >= video.duration - 1) {
      startAutoClose();
    }
  });

  /* Phones: AnimatedTerminal — live 2D canvas terminal mapped onto 3D phone screens. */
class AnimatedTerminal {
  constructor(side) {
    this.canvas = document.createElement('canvas');
    this.canvas.width = 300;
    this.canvas.height = 649;
    this.ctx = this.canvas.getContext('2d');
    this.texture = new THREE.CanvasTexture(this.canvas);
    this.texture.encoding = THREE.sRGBEncoding;
    this.texture.anisotropy = 4;

    this.side = side;
    this.typingIndex = 0;
    this.lines = [];          // completed lines
    this.currentLineChars = 0;
    this.timer = 0;
    this.started = false;
    this.cursorVisible = true;
    this.cursorTimer = 0;

    if (side === 'L') {
      this.script = [
        { text: "admin@iphone:~ $ ssh my-mac",              delay: 0.6, typeSpeed: 0.045 },
        { text: "Connecting to my-mac.local...",             delay: 0.3, typeSpeed: 0 },
        { text: "ECDSA key fingerprint SHA256:xK9...",       delay: 0.15, typeSpeed: 0 },
        { text: "Warning: added 'my-mac' (ED25519) to known hosts.", delay: 0.2, typeSpeed: 0 },
        { text: "admin@my-mac's password: ********",         delay: 0.5, typeSpeed: 0.07 },
        { text: "Last login: Sat Mar  7 09:12 on ttys001",   delay: 0.15, typeSpeed: 0 },
        { text: "Access granted.",                           delay: 0.25, typeSpeed: 0 },
        { text: "> Coffeetosh Daemon active.",               delay: 0.6, typeSpeed: 0.03 },
      ];
    } else {
      this.script = [
        { text: "guest@iphone:~ $ systemctl status cmd",     delay: 0.9, typeSpeed: 0.04 },
        { text: "\u25CF cmd.service - Link Manager",              delay: 0.25, typeSpeed: 0 },
        { text: "   Loaded: loaded (/etc/systemd/system/)",  delay: 0.1, typeSpeed: 0 },
        { text: "   Active: active (running) since 09:14",   delay: 0.35, typeSpeed: 0 },
        { text: "   PID: 4821 (coffeetoshd)",                delay: 0.1, typeSpeed: 0 },
        { text: "Starting secondary diagnostic ping...",     delay: 0.4, typeSpeed: 0 },
        { text: "64 bytes from 192.168.1.10: time=1.2ms",   delay: 0.22, typeSpeed: 0 },
        { text: "64 bytes from 192.168.1.10: time=1.1ms",   delay: 0.18, typeSpeed: 0 },
        { text: "64 bytes from 192.168.1.10: time=0.9ms",   delay: 0.18, typeSpeed: 0 },
        { text: "> Secure Stream OK.",                       delay: 0.6, typeSpeed: 0.045 },
      ];
    }

    this.redraw();
  }

  start() {
    if (this.started) return;
    this.started = true;
    this.timer = this.script.length > 0 ? this.script[0].delay : 0;
  }

  reset() {
    this.typingIndex = 0;
    this.lines = [];
    this.currentLineChars = 0;
    this.timer = this.script.length > 0 ? this.script[0].delay : 0;
    this.started = false;
    this.cursorVisible = true;
    this.cursorTimer = 0;
    this.redraw();
  }

  update(dt) {
    /* Blink cursor every 0.5s even while idle */
    this.cursorTimer += dt;
    if (this.cursorTimer >= 0.5) {
      this.cursorTimer -= 0.5;
      this.cursorVisible = !this.cursorVisible;
      if (this.started) this.redraw();
    }

    if (!this.started || this.typingIndex >= this.script.length) return;

    this.timer -= dt;
    const activeLine = this.script[this.typingIndex];
    let dirty = false;

    if (this.timer <= 0) {
      if (activeLine.typeSpeed > 0 && this.currentLineChars < activeLine.text.length) {
        /* Character-by-character typing */
        this.currentLineChars++;
        this.timer = activeLine.typeSpeed + (Math.random() * 0.025 - 0.01);
        dirty = true;
      } else {
        /* Line complete — commit and advance */
        this.lines.push(activeLine.text);
        this.typingIndex++;
        this.currentLineChars = 0;
        if (this.typingIndex < this.script.length) {
          this.timer = this.script[this.typingIndex].delay;
        }
        dirty = true;
      }
    }

    if (dirty) this.redraw();
  }

  /* Determine text color based on content */
  _colorForLine(line) {
    if (line.startsWith('>'))                                     return '#D4923A'; // accent orange
    if (line.includes('Coffeetosh') || line.includes('Secure'))   return '#D4923A';
    if (line.includes('granted') || line.includes('active (run')) return '#98c379'; // green
    if (line.includes('192.168') || line.includes('time='))       return '#D4923A'; // IP/port orange
    if (line.startsWith('admin') || line.startsWith('guest'))     return '#61afef'; // blue prompt
    if (line.includes('$ '))                                      return '#ffffff'; // command white
    if (line.includes('PID:') || line.includes('Loaded:'))        return '#5c6370'; // dim grey
    return '#abb2bf';                                                               // default muted
  }

  redraw() {
    const c = this.ctx;
    const W = 300, H = 649;

    /* ── Background ── */
    c.fillStyle = '#1e2227';
    c.fillRect(0, 0, W, H);

    /* ── iOS status bar ── */
    /* Notch placeholder */
    c.fillStyle = '#000000';
    const notchW = 100, notchH = 26;
    const notchR = 10;
    const nx = (W - notchW) / 2, ny = 0;
    c.beginPath();
    c.moveTo(nx, ny);
    c.lineTo(nx + notchW, ny);
    c.lineTo(nx + notchW, ny + notchH - notchR);
    c.quadraticCurveTo(nx + notchW, ny + notchH, nx + notchW - notchR, ny + notchH);
    c.lineTo(nx + notchR, ny + notchH);
    c.quadraticCurveTo(nx, ny + notchH, nx, ny + notchH - notchR);
    c.closePath();
    c.fill();

    /* Clock */
    c.fillStyle = '#ffffff';
    c.font = 'bold 15px -apple-system, sans-serif';
    c.textAlign = 'left';
    c.fillText('12:00', 18, 23);

    /* Battery icon (pill) */
    c.fillStyle = '#ffffff';
    c.strokeStyle = '#ffffff';
    c.lineWidth = 1.2;
    const bx = 248, by = 10, bw = 26, bh = 13, br = 3;
    /* Outline */
    c.beginPath();
    c.moveTo(bx + br, by);
    c.lineTo(bx + bw - br, by);
    c.quadraticCurveTo(bx + bw, by, bx + bw, by + br);
    c.lineTo(bx + bw, by + bh - br);
    c.quadraticCurveTo(bx + bw, by + bh, bx + bw - br, by + bh);
    c.lineTo(bx + br, by + bh);
    c.quadraticCurveTo(bx, by + bh, bx, by + bh - br);
    c.lineTo(bx, by + br);
    c.quadraticCurveTo(bx, by, bx + br, by);
    c.closePath();
    c.stroke();
    /* Fill inside */
    c.fillRect(bx + 3, by + 3, bw - 6, bh - 6);
    /* Battery nub */
    c.fillRect(bx + bw + 1, by + 3, 2.5, bh - 6);

    /* Signal bars */
    c.fillStyle = '#ffffff';
    for (let i = 0; i < 4; i++) {
      const barH = 4 + i * 3;
      c.fillRect(230 + i * 5, 10 + (13 - barH), 3, barH);
    }

    /* ── Terminal lines ── */
    c.font = '13px "SF Mono", "Menlo", monospace';
    c.textAlign = 'left';
    let y = 70;
    const lineH = 22;

    for (const line of this.lines) {
      c.fillStyle = this._colorForLine(line);
      c.fillText(line, 16, y, W - 32);
      y += lineH;
    }

    /* Currently typing line with blinking cursor */
    if (this.typingIndex < this.script.length) {
      const activeLine = this.script[this.typingIndex];
      if (activeLine.typeSpeed > 0 && this.currentLineChars > 0) {
        const partial = activeLine.text.substring(0, this.currentLineChars);
        c.fillStyle = '#ffffff';
        c.fillText(partial, 16, y, W - 32);
        /* Blinking block cursor */
        if (this.cursorVisible) {
          const tw = c.measureText(partial).width;
          c.fillStyle = '#D4923A';
          c.fillRect(16 + tw + 1, y - 12, 8, 15);
        }
      }
    } else if (this.started) {
      /* All lines done — show idle blinking cursor on new prompt */
      if (this.cursorVisible) {
        const prompt = this.side === 'L' ? 'admin@my-mac:~ $ ' : 'guest@iphone:~ $ ';
        c.fillStyle = '#61afef';
        c.fillText(prompt, 16, y, W - 32);
        const tw = c.measureText(prompt).width;
        c.fillStyle = '#D4923A';
        c.fillRect(16 + tw + 1, y - 12, 8, 15);
      }
    }

    /* Subtle scanline overlay for texture depth */
    c.fillStyle = 'rgba(0,0,0,0.04)';
    for (let sy = 0; sy < H; sy += 3) {
      c.fillRect(0, sy, W, 1);
    }

    this.texture.needsUpdate = true;
  }
}

  function createPhone(px, py, pz, rotY, rotX, rotZ, terminalObj) {
    const grp = new THREE.Group();
    const pw = 0.38, ph = 0.82, pd = 0.04;
    const body = new THREE.Mesh(
      makeRoundedBoxGeo(pw, ph, pd, 0.045),
      new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.2 })
    );
    body.castShadow = true;
    grp.add(body);

    const scrMat = new THREE.MeshBasicMaterial({ map: terminalObj.texture, side: THREE.DoubleSide });
    const scr = new THREE.Mesh(new THREE.PlaneGeometry(pw - 0.04, ph - 0.04), scrMat);
    /* Body bevel pushes front face to ~pd/2 + bevelThickness. Place screen just in front. */
    const bevelT = Math.min(0.045 * 0.3, pd * 0.3);
    scr.position.z = pd / 2 + bevelT + 0.002;
    grp.add(scr);

    grp.position.set(px, py, pz);
    grp.rotation.set(rotX, rotY, rotZ);
    grp.scale.set(0, 0, 0); 
    return grp;
  }

  const PHONE_VISIBLE_SCALE = isMobile ? 0.40 : 0.65;
  const termL = new AnimatedTerminal('L');
  const termR = new AnimatedTerminal('R');
  // Desktop: phones wider flanking laptop. Mobile: tighter, higher, stacked look.
  const phoneXOff = isMobile ? 0.55 : 1.25;
  const phoneYL  = isMobile ? 0.45 : 0.10;
  const phoneYR  = isMobile ? 0.35 : 0.00;
  const phoneL = createPhone(-phoneXOff, phoneYL, 0.35,  0.25, -0.06, -0.06, termL);
  const phoneR = createPhone( phoneXOff, phoneYR, 0.40, -0.25, -0.06,  0.06, termR);
  masterGroup.add(phoneL, phoneR);

  /* ── 3D curved dashed lines with draw-on animation (phone → Mac) ── */
  const LINE_SEGMENTS = 120; // more segments = smoother draw-on
  function makeDash(from, to, control1, control2) {
    const curve = new THREE.CubicBezierCurve3(from, control1, control2, to);
    const points = curve.getPoints(LINE_SEGMENTS);
    const geo = new THREE.BufferGeometry().setFromPoints(points);
    const mat = new THREE.LineDashedMaterial({
      color: 0xD4923A, dashSize: 0.06, gapSize: 0.03,
      transparent: true, opacity: 0, linewidth: 2
    });
    const line = new THREE.Line(geo, mat);
    line.computeLineDistances();
    /* Start with nothing drawn — we'll animate drawRange.count */
    geo.setDrawRange(0, 0);
    return line;
  }

  /* Lines are created after GLB loads so we know the real base position. */
  let lineL = null;
  let lineR = null;

  /* ── 3D click indicator — subtle accent ring + dot above closed Mac ── */
  const clickIndicator = new THREE.Group();
  (function() {
    /* Outer ring */
    var ringGeo = new THREE.RingGeometry(0.06, 0.075, 32);
    var ringMat = new THREE.MeshBasicMaterial({
      color: 0xD4923A, transparent: true, opacity: 0, side: THREE.DoubleSide
    });
    var ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2; /* lay flat */
    clickIndicator.add(ring);
    /* Center dot */
    var dotGeo = new THREE.CircleGeometry(0.025, 24);
    var dotMat = new THREE.MeshBasicMaterial({
      color: 0xD4923A, transparent: true, opacity: 0, side: THREE.DoubleSide
    });
    var dot = new THREE.Mesh(dotGeo, dotMat);
    dot.rotation.x = -Math.PI / 2;
    clickIndicator.add(dot);
    clickIndicator.position.set(0, 0.15, 0); /* above Mac center, adjusted after load */
    clickIndicator.visible = false;
  })();
  masterGroup.add(clickIndicator);

  /* ── Load GLB ── */
  let lidPivot = null;         /* pivot group AT the hinge — just rotate this */
  let bodyNodeRef = null;
  let lidNodeRef = null;
  let modelLoaded = false;

  let LID_OPEN_ANGLE = 0.0;
  let LID_CLOSE_ANGLE = 2.0 - 0.052; // ~114° bent toward keyboard to shut, minus 3° hover gap
  let LID_CLOSE_Y_OFFSET = 0; // Removed physical sink 
  let LID_CLOSE_Z_OFFSET = 0.06; // Slide screen precisely forward so it closes perfectly flush!
  let LID_PIVOT_Y0 = 0;
  let LID_PIVOT_Z0 = 0;

  let lidProgress = 0; /* 0=open, 1=closed */
  let lidIsClosed = false;
  let lidIsAnimating = false;
  let lidAnimFrom = 0;
  let lidAnimTo = 0;
  let lidAnimStartMs = 0;
  const LID_TOGGLE_DUR_MS = 1400;

  /* ── Hero state machine: LOADING→INTRO→PLAYING→CLOSING→CLOSED→OPENING→PLAYING… ── */
  let heroState = 'LOADING';
  let playStartTime = 0;
  const PLAY_FALLBACK_SEC = 6; /* auto-close after 6s if no video */
  let pendingReopen = false;

  /* ── Intro fly-in animation ── */
  const INTRO_DUR_MS = 1800;
  let introStartMs = 0;
  const INTRO_Y_OFFSET = -1.2;   /* start below */
  const INTRO_ROT_Y = Math.PI * 0.15;  /* slight Y rotation at start */

  function applyLidPose(progress) {
    if (!lidPivot) return;
    lidPivot.rotation.x = LID_OPEN_ANGLE + (LID_CLOSE_ANGLE - LID_OPEN_ANGLE) * progress;
    lidPivot.position.y = LID_PIVOT_Y0 + (LID_CLOSE_Y_OFFSET * progress);
    lidPivot.position.z = LID_PIVOT_Z0 + (LID_CLOSE_Z_OFFSET * progress);
  }

  function startAutoClose() {
    if (heroState !== 'PLAYING') return;
    heroState = 'CLOSING';
    lidIsAnimating = true;
    lidAnimFrom = 0;
    lidAnimTo = 1;
    lidAnimStartMs = performance.now();
  }

  function onCloseComplete() {
    lidIsClosed = true;
    if (videoReady) video.pause();
    if (pendingReopen) {
      pendingReopen = false;
      heroState = 'CLOSED';
      startReopen();
      return;
    }
    heroState = 'CLOSED';
    /* Show click indicator after a short delay */
    setTimeout(function() {
      if (heroState === 'CLOSED') clickIndicator.visible = true;
    }, 800);
  }

  function startReopen() {
    if (heroState === 'CLOSING') {
      /* User clicked while lid is still closing — queue reopen */
      pendingReopen = true;
      return;
    }
    if (heroState !== 'CLOSED') return;
    heroState = 'OPENING';
    clickIndicator.visible = false;
    /* Show first frame while lid opens */
    if (videoReady) {
      video.currentTime = 0;
      video.pause();
    }
    lidIsAnimating = true;
    lidAnimFrom = lidProgress;
    lidAnimTo = 0;
    lidAnimStartMs = performance.now();
  }

  function onOpenComplete() {
    heroState = 'PLAYING';
    lidIsClosed = false;
    lidProgress = 0;
    playStartTime = elapsed;
    termL.reset();
    termR.reset();
    /* Video is already at frame 0 from startReopen — just play */
    if (videoReady) {
      video.playbackRate = 1.5;
      video.play().catch(function(){});
    }
  }

  const loader = new THREE.GLTFLoader();
  loader.load('assets/macbook.glb', function(gltf) {
    const model = gltf.scene;

    /* Scale + center FIRST so all measurements below are in final world units. */
    var box0 = new THREE.Box3().setFromObject(model);
    var size0 = box0.getSize(new THREE.Vector3());
    var sf = 1.75 / Math.max(size0.x, size0.y, size0.z);
    model.scale.setScalar(sf);
    var box1 = new THREE.Box3().setFromObject(model);
    var ctr = box1.getCenter(new THREE.Vector3());
    model.position.sub(ctr);
    model.position.y -= 0.12;
    model.updateMatrixWorld(true);

    let lidNode = null, bodyNode = null;
    model.traverse(function(obj) {
      if (!lidNode  && obj.name && obj.name.indexOf('VCQqxpxkUlzqcJI') !== -1) lidNode  = obj;
      if (!bodyNode && obj.name && obj.name.indexOf('BoBvWqDHZjAeVrp') !== -1) bodyNode = obj;
    });
    console.log('[GLB] lid:', lidNode && lidNode.name, 'body:', bodyNode && bodyNode.name);

    if (lidNode && bodyNode) {
      lidNodeRef = lidNode;
      bodyNodeRef = bodyNode;
      model.updateMatrixWorld(true);

      /* Use world boxes and convert hinge back to model-local, no identity assumptions. */
      const lidBox  = new THREE.Box3().setFromObject(lidNode);
      const bodyBox = new THREE.Box3().setFromObject(bodyNode);
      console.log('[GLB] lid  min', lidBox.min.toArray(),  'max', lidBox.max.toArray());
      console.log('[GLB] body min', bodyBox.min.toArray(), 'max', bodyBox.max.toArray());

      /* ── Create dashed lines now that we know real base geometry ── */
      var bLeft   = bodyBox.min.x;          // left edge of base
      var bRight  = bodyBox.max.x;          // right edge of base
      var bTop    = bodyBox.max.y;           // top surface of base
      var bMidZ   = (bodyBox.min.z + bodyBox.max.z) / 2; // mid-depth of base
      console.log('[GLB] base sides L/R:', bLeft, bRight, 'top:', bTop, 'midZ:', bMidZ);

      var lineDip  = isMobile ? -0.45 : -0.9;     // less dramatic dip on mobile
      var lineArcX = isMobile ? 0.25 : 0.5;          // tighter horizontal arc on mobile
      var lineArcY = isMobile ? -0.3 : -0.6;          // shallower vertical arc on mobile
      var lineZPull = isMobile ? 0.3 : 0.6;           // less z-pull on mobile

      lineL = makeDash(
        new THREE.Vector3(-phoneXOff, phoneYL - 0.41, 0.35),        // start: bottom of left phone
        new THREE.Vector3(bLeft, bTop + 0.01, bMidZ),               // end: left edge of Mac base
        new THREE.Vector3(-phoneXOff - 0.05, lineDip, bMidZ - lineZPull),   // ctrl1
        new THREE.Vector3(bLeft - lineArcX, bTop + lineArcY, bMidZ - lineZPull * 0.4) // ctrl2
      );
      lineR = makeDash(
        new THREE.Vector3(phoneXOff, phoneYR - 0.41, 0.40),         // start: bottom of right phone
        new THREE.Vector3(bRight, bTop + 0.01, bMidZ),              // end: right edge of Mac base
        new THREE.Vector3(phoneXOff + 0.05, lineDip, bMidZ - lineZPull),    // ctrl1
        new THREE.Vector3(bRight + lineArcX, bTop + lineArcY, bMidZ - lineZPull * 0.4) // ctrl2
      );
      masterGroup.add(lineL, lineR);

      /* Hinge: the physical hinge is at the TOP-BACK edge of the BODY (keyboard deck).
         The model starts OPEN, so we must NOT use entireModelBox (which includes
         the screen extending backward). Use bodyBox for accurate hinge placement. */
      const hingeWorld = new THREE.Vector3(
        (bodyBox.min.x + bodyBox.max.x) / 2,  // center-X of body
        bodyBox.max.y,                          // top surface of keyboard deck
        bodyBox.min.z                           // back edge of body (actual hinge axis)
      );
      console.log('[GLB] hinge(world)', hingeWorld.toArray());

      /* Pivot-group with world-transform preservation. */
      lidPivot = new THREE.Group();
      lidPivot.position.copy(model.worldToLocal(hingeWorld.clone()));
      LID_PIVOT_Y0 = lidPivot.position.y;
      LID_PIVOT_Z0 = lidPivot.position.z;
      model.add(lidPivot);
      model.updateMatrixWorld(true);
      lidPivot.attach(lidNode);
      model.updateMatrixWorld(true);
      console.log('[GLB] pivot(local)', lidPivot.position.toArray());

      /* The model is actually modeled completely OPEN.
         Therefore, its initial rotation (0) is visually open (lid up). */
      LID_CLOSE_Y_OFFSET = 0;
      lidPivot.position.y = LID_PIVOT_Y0;
      lidPivot.position.z = LID_PIVOT_Z0;

      /* Model natively starts visually OPEN (0 rad = lid up).
         OPEN  = 0.0  (stay where you are: visually open)
         CLOSE = +2.0 rad (~114°) bent toward the keyboard to shut,
                 minus 0.052 rad (~3°) so it hovers and doesn't clip the base. */
      LID_OPEN_ANGLE = 0.0;
      LID_CLOSE_ANGLE = 2.0 - 0.052;
      LID_CLOSE_Z_OFFSET = 0.06;

      console.log('[GLB] Model starts loaded OPEN. Open Angle:', LID_OPEN_ANGLE, 'Close Angle:', LID_CLOSE_ANGLE);

      /* Reset to open pose — animation starts from here. */
      lidPivot.rotation.x = LID_OPEN_ANGLE;
      lidPivot.position.y = LID_PIVOT_Y0;
      console.log('[GLB] openAngle', LID_OPEN_ANGLE.toFixed(3), 'closeAngle', LID_CLOSE_ANGLE.toFixed(4));

      /* ── Apply video to screen mesh: Object_183 (mat: sfCQkHOWyrsLmor, index 12) ── */
      var screenMesh = null;
      lidNode.traverse(function(child) {
        if (child.isMesh && child.material && child.material.name === 'sfCQkHOWyrsLmor') {
          screenMesh = child;
        }
      });
      console.log('[GLB] screen mesh found:', screenMesh ? screenMesh.name : 'NONE');

      function applyVideoToScreen() {
        if (!ENABLE_SCREEN_VIDEO || !screenMesh) return;
        var vTex = new THREE.VideoTexture(video);
        vTex.encoding = THREE.sRGBEncoding;
        screenMesh.material = new THREE.MeshBasicMaterial({ map: vTex, toneMapped: false });
        /* Don't auto-play here — let the state machine start playback */
        video.currentTime = 0;
        console.log('[GLB] video applied to', screenMesh.name);
      }

      if (ENABLE_SCREEN_VIDEO) {
        /* Video may already be ready if cached — check readyState */
        if (video.readyState >= 3) {
          videoReady = true;
          applyVideoToScreen();
        } else {
          video.addEventListener('canplay', function() {
            videoReady = true;
            applyVideoToScreen();
          }, { once: true });
        }
      }

      applyLidPose(0);

      /* Position click indicator above the closed Mac surface, forward of logo */
      var indicZ = bodyBox.max.z + 0.15;
      clickIndicator.position.set(0, bodyBox.max.y + 0.08, indicZ);
      console.log('[GLB] indicator pos:', 0, bodyBox.max.y + 0.08, indicZ, 'bodyBox.max.z:', bodyBox.max.z);

      /* Auto-close is started in the render loop once model is definitely ready in scene. */
    }

    masterGroup.add(model);
    modelLoaded = true;
    /* Hide model initially for intro */
    masterGroup.position.y = INTRO_Y_OFFSET;
    masterGroup.rotation.y = INTRO_ROT_Y;
    console.log('[GLB] loaded. scale:', sf);

  }, undefined, function(err) {
    console.error('[GLB] load error', err);
    modelLoaded = true;
  });

  /* Click to toggle lid open/closed */
  canvas.addEventListener('pointerdown', function() {
    if (!lidPivot || !modelLoaded || lidIsAnimating) return;
    if (heroState === 'CLOSED') {
      startReopen();
    } else if (heroState === 'PLAYING') {
      startAutoClose();
    }
  });
  canvas.style.cursor = 'pointer';

  /* ── Animation ── */
  const clock = new THREE.Clock();
  let elapsed = 0;
  const FLOAT_START  = 4.0;

  function ease(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }

  function animate() {
    requestAnimationFrame(animate);
    var dt = clock.getDelta();
    elapsed += dt;

    /* ── Lid toggle animation (open <-> closed) ── */
    if (lidPivot) {
      /* State: start intro fly-in once model loaded */
      if (heroState === 'LOADING' && modelLoaded) {
        heroState = 'INTRO';
        introStartMs = performance.now();
      }

      /* Intro fly-in animation */
      if (heroState === 'INTRO') {
        var it = Math.min((performance.now() - introStartMs) / INTRO_DUR_MS, 1);
        var ie = it < 0.5 ? 4 * it * it * it : 1 - Math.pow(-2 * it + 2, 3) / 2;
        masterGroup.position.y = INTRO_Y_OFFSET * (1 - ie);
        masterGroup.rotation.y = INTRO_ROT_Y * (1 - ie);
        if (it >= 1) {
          masterGroup.position.y = 0;
          masterGroup.rotation.y = 0;
          heroState = 'PLAYING';
          playStartTime = elapsed;
          if (videoReady) { video.currentTime = 0; video.playbackRate = 1.5; video.play().catch(function(){}); }
        }
      }
      /* Fallback: auto-close after timer if no video */
      if (heroState === 'PLAYING' && !videoReady && elapsed - playStartTime > PLAY_FALLBACK_SEC) {
        startAutoClose();
      }

      if (lidIsAnimating) {
        var t = Math.min((performance.now() - lidAnimStartMs) / LID_TOGGLE_DUR_MS, 1);
        var e = ease(t);
        lidProgress = lidAnimFrom + (lidAnimTo - lidAnimFrom) * e;
        if (t >= 1) {
          lidProgress = lidAnimTo;
          lidIsAnimating = false;
          if (lidAnimTo === 1) onCloseComplete();
          else if (lidAnimTo === 0) onOpenComplete();
        }
      }

      applyLidPose(lidProgress);
    }

    /* Phones and lines: sequence after laptop nears closed.
       Each phone + its line animate together, left first then right. */
    var seq = THREE.MathUtils.clamp((lidProgress - 0.80) / 0.20, 0, 1);
    /* Left phone + line together in first half, right phone + line in second half */
    var leftP  = ease(THREE.MathUtils.clamp(seq / 0.5, 0, 1));
    var rightP = ease(THREE.MathUtils.clamp((seq - 0.5) / 0.5, 0, 1));

    phoneL.scale.set(leftP * PHONE_VISIBLE_SCALE, leftP * PHONE_VISIBLE_SCALE, leftP * PHONE_VISIBLE_SCALE);
    phoneR.scale.set(rightP * PHONE_VISIBLE_SCALE, rightP * PHONE_VISIBLE_SCALE, rightP * PHONE_VISIBLE_SCALE);

    /* Draw-on animation: line progressively draws from phone → Mac */
    if (lineL) {
      lineL.material.opacity = leftP > 0.01 ? 0.9 : 0;
      var drawCountL = Math.floor(leftP * (LINE_SEGMENTS + 1));
      lineL.geometry.setDrawRange(0, drawCountL);
    }
    if (lineR) {
      lineR.material.opacity = rightP > 0.01 ? 0.9 : 0;
      var drawCountR = Math.floor(rightP * (LINE_SEGMENTS + 1));
      lineR.geometry.setDrawRange(0, drawCountR);
    }
    document.getElementById('glow-ring').style.opacity = rightP > 0.01 ? '0.8' : '0';

    if (leftP > 0.3 && !termL.started) termL.start();
    if (rightP > 0.3 && !termR.started) termR.start();
    
    termL.update(dt);
    termR.update(dt);

    /* Flowing dashes along the drawn portion */
    if (lineL) lineL.material.dashOffset -= dt * 2.0;
    if (lineR) lineR.material.dashOffset -= dt * 2.0;

    /* Click indicator pulse */
    if (clickIndicator.visible) {
      var pulse = 0.5 + 0.5 * Math.sin(elapsed * 3.0);
      var ringChild = clickIndicator.children[0];
      var dotChild  = clickIndicator.children[1];
      ringChild.material.opacity = 0.25 + pulse * 0.35;
      dotChild.material.opacity  = 0.4 + pulse * 0.4;
      var sc = 1.0 + pulse * 0.15;
      ringChild.scale.set(sc, sc, sc);
    }

    /* Idle float — only after intro is done */
    if (heroState !== 'INTRO' && heroState !== 'LOADING' && elapsed >= FLOAT_START) {
      masterGroup.position.y = Math.sin((elapsed - FLOAT_START) * 1.2) * 0.005;
    }

    renderer.render(scene, camera);
  }
  animate();

  /* ── Resize ── */
  window.addEventListener('resize', function() {
    var w = container.clientWidth, h = container.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
})();
</script>
<script>
/* ── Playful Download button (first-visit only) ── */
(function(){
  var btn = document.querySelector('.hero-btn');
  if (!btn) return;
  var btnSpan = btn.querySelector('span');
  var origText = btnSpan.textContent;
  var isFirstVisit = !sessionStorage.getItem('ct_btn_seen');
  var evadeCount = 0;
  var MAX_EVADES = 4;
  var isEvading = false;
  var resetTimer = null;
  var funnyTexts = ['Learn First \uD83D\uDE0F', 'Not so fast!', 'Read the docs \uD83D\uDC40', 'Catch me!'];

  if (!isFirstVisit) return;

  /* Prevent navigation during evade phase */
  btn.addEventListener('click', function(e) {
    if (isFirstVisit && evadeCount < MAX_EVADES) e.preventDefault();
  });

  /* Distance-based evasion — no flicker from enter/leave cycle */
  document.addEventListener('mousemove', function(e) {
    if (!isFirstVisit || evadeCount >= MAX_EVADES) return;
    var rect = btn.getBoundingClientRect();
    var cx = rect.left + rect.width / 2;
    var cy = rect.top + rect.height / 2;
    var dist = Math.hypot(e.clientX - cx, e.clientY - cy);

    if (dist < 60 && !isEvading) {
      /* Close enough — dodge! */
      isEvading = true;
      if (resetTimer) { clearTimeout(resetTimer); resetTimer = null; }
      evadeCount++;
      var dx = e.clientX - cx;
      var moveX = dx > 0 ? -160 : 160;
      var moveY = (Math.random() - 0.5) * 50;
      btn.style.transform = 'translate(' + moveX + 'px,' + moveY + 'px)';
      btnSpan.textContent = funnyTexts[(evadeCount - 1) % funnyTexts.length];
    } else if (dist > 200 && isEvading) {
      /* Far enough — settle back */
      isEvading = false;
      resetTimer = setTimeout(function() {
        btn.style.transform = 'translate(0,0)';
        if (evadeCount >= MAX_EVADES) {
          btnSpan.textContent = origText;
          isFirstVisit = false;
          sessionStorage.setItem('ct_btn_seen', '1');
        } else {
          btnSpan.textContent = origText;
        }
      }, 400);
    }
  });
})();
</script>
