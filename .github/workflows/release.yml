name: Release

# Triggers on any tag like v1.0.0, v1.2.3-beta, etc.
on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

jobs:
  release:
    name: Build & Release
    runs-on: macos-14   # Apple Silicon runner (M1) — builds arm64 natively
    permissions:
      contents: write   # Required to create GitHub Releases and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build both architectures ──────────────────────────────────
      - name: Build arm64
        run: swift build -c release --arch arm64

      - name: Build x86_64
        run: swift build -c release --arch x86_64

      # ── Lipo into universal binaries ──────────────────────────────
      - name: Create universal binaries
        run: |
          mkdir -p .build/universal
          for BIN in coffeetosh coffeetosh-daemon coffeetosh-cleanup; do
            lipo -create -output ".build/universal/$BIN" \
              ".build/arm64-apple-macosx/release/$BIN" \
              ".build/x86_64-apple-macosx/release/$BIN"
          done

      # ── Ad-hoc sign (removes "damaged app" on Apple Silicon) ─────
      - name: Ad-hoc code sign
        run: |
          for BIN in coffeetosh coffeetosh-daemon coffeetosh-cleanup; do
            codesign --force --sign - ".build/universal/$BIN"
          done

      # ── Build .app bundle + DMG ─────────────────────────────────
      - name: Build app bundle and DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP_NAME="Coffeetosh"
          BUILD_DIR="ci-build"
          APP_BUNDLE="${BUILD_DIR}/${APP_NAME}.app"
          MACOS_DIR="${APP_BUNDLE}/Contents/MacOS"
          RESOURCES_DIR="${APP_BUNDLE}/Contents/Resources"

          mkdir -p "${MACOS_DIR}" "${RESOURCES_DIR}"

          # Copy universal binaries
          cp .build/universal/coffeetosh         "${MACOS_DIR}/coffeetosh"
          cp .build/universal/coffeetosh-daemon  "${MACOS_DIR}/coffeetosh-daemon"
          cp .build/universal/coffeetosh-cleanup "${MACOS_DIR}/coffeetosh-cleanup"
          ln -sf coffeetosh "${MACOS_DIR}/${APP_NAME}"

          # Copy resources
          cp Resources/com.coffeetosh.cleanup.plist "${RESOURCES_DIR}/"
          cp Resources/com.coffeetosh.daemon.plist  "${RESOURCES_DIR}/"
          cp ASSETS/Coffeetosh.icns                 "${RESOURCES_DIR}/Coffeetosh.icns"

          # Generate Info.plist
          cat > "${APP_BUNDLE}/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>${APP_NAME}</string>
            <key>CFBundleDisplayName</key><string>${APP_NAME}</string>
            <key>CFBundleIdentifier</key><string>com.coffeetosh</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleExecutable</key><string>${APP_NAME}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>13.0</string>
            <key>LSUIElement</key><true/>
            <key>NSPrincipalClass</key><string>NSApplication</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>CFBundleIconFile</key><string>Coffeetosh</string>
          </dict></plist>
          PLIST

          # Ad-hoc sign the bundle
          codesign --force --deep --sign - "${APP_BUNDLE}"

          # Add Applications symlink for drag-and-drop install
          ln -sf /Applications "${BUILD_DIR}/Applications"

          # Create DMG
          hdiutil create \
            -volname "${APP_NAME}" \
            -srcfolder "${BUILD_DIR}" \
            -ov -format UDZO \
            "${BUILD_DIR}/${APP_NAME}.dmg"

          rm -f "${BUILD_DIR}/Applications"

          echo "DMG_PATH=${BUILD_DIR}/${APP_NAME}.dmg" >> "$GITHUB_ENV"

      # ── Package tarball ───────────────────────────────────────────
      - name: Package release tarball
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARNAME="Coffeetosh-v${VERSION}-macos"
          STAGING="staging/${TARNAME}"

          mkdir -p "${STAGING}/Resources"

          # Binaries
          cp .build/universal/coffeetosh         "${STAGING}/"
          cp .build/universal/coffeetosh-daemon  "${STAGING}/"
          cp .build/universal/coffeetosh-cleanup "${STAGING}/"

          # Resources (plist templates)
          cp Resources/com.coffeetosh.daemon.plist  "${STAGING}/Resources/"
          cp Resources/com.coffeetosh.cleanup.plist "${STAGING}/Resources/"

          # License
          cp LICENSE "${STAGING}/" 2>/dev/null || true

          # Create tarball
          cd staging
          tar -czf "${TARNAME}.tar.gz" "${TARNAME}"
          SHA=$(shasum -a 256 "${TARNAME}.tar.gz" | awk '{print $1}')

          echo "VERSION=${VERSION}"     >> "$GITHUB_ENV"
          echo "TARNAME=${TARNAME}"     >> "$GITHUB_ENV"
          echo "SHA256=${SHA}"          >> "$GITHUB_ENV"

      # ── Create GitHub Release ─────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            staging/${{ env.TARNAME }}.tar.gz
            ${{ env.DMG_PATH }}
          body: |
            ## Coffeetosh v${{ env.VERSION }}

            ### Install via Homebrew (recommended)
            ```bash
            brew tap prophesourvolodymyr/coffeetosh https://github.com/prophesourvolodymyr/CoffeeTosh
            brew install coffeetosh
            brew services start coffeetosh
            ```

            ### Manual install
            ```bash
            curl -L https://github.com/prophesourvolodymyr/CoffeeTosh/releases/download/v${{ env.VERSION }}/${{ env.TARNAME }}.tar.gz | tar xz
            cd ${{ env.TARNAME }}
            sudo cp coffeetosh /usr/local/bin/
            ```

            ---
            **For formula maintainers — update `Formula/coffeetosh.rb` sha256 to:**
            ```
            ${{ env.SHA256 }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
