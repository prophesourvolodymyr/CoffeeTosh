<!DOCTYPE html><html><body><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script><script>
const loader = new THREE.GLTFLoader();
loader.load('http://localhost:8080/assets/macbook.glb', gltf => {
  let lid, body;
  gltf.scene.traverse(c => {
    if(!lid && c.name.includes('VCQqxpxkUlzqcJI')) lid = c;
    if(!body && c.name.includes('BoBvWqDHZjAeVrp')) body = c;
  });
  const lidBox = new THREE.Box3().setFromObject(lid);
  const bodyBox = new THREE.Box3().setFromObject(body);
  console.log("lidBox min", lidBox.min, "max", lidBox.max);
  console.log("bodyBox min", bodyBox.min, "max", bodyBox.max);
});
</script></body></html>
